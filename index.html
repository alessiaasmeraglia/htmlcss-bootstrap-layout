<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid Layout</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <!-- Header -->
    <div class="container py-5">
    <header class="text-center mb-5">
        <h1>Bootstrap 5 Responsive Grid</h1>
        <p class="text-secondary">Layout a griglia con diversi breakpoint (sm, md, lg).</p>
    </header>
    </div>
    
    <!-- Contenuto principale -->
    <div class="row mb-4">
        <div class="col-12 col-md-6 col-lg-4">
            <h2>Colonna 1</h2>
            <p>Contenuto della prima colonna. Si adatta ai diversi breakpoint.</p>
        </div>

    </div>

    <div class="col-12 col-md-6 col-lg-8">
        <div class="p-4 bg-secondary text-white">
            <h2>Colonna 2</h2>
            <p>Larghezza intera su dispositivi piccoli, metà larghezza su dispositivi medi e due terzi su dispositivi grandi.</p>
        </div>
    </div>

    
    
</body>
</html>
